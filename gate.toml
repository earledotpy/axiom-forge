[project]
name = "axiom-forge"
default_base = "main"

[verify]
timeout_seconds = 300
required_checks = ["unit"]

[checks.unit]
command = ["python", "-m", "unittest", "discover", "-s", "tests"]

[promotion]
branch_prefix = "gate/"
patch_file = "patch.diff"
record_file = "record.json"
promotion_file = "promotion.json"
require_clean_target = true
require_operator_run_id = true
allow_existing_branch = false
