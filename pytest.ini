[pytest]
# Dev-loop test runner ONLY. The gate contract is unchanged and still runs
# `python -m unittest discover -s tests` (see gate.toml -> checks.unit).
#
# Why -n auto is mandatory here: on Windows, pytest's default output capture
# swaps std handles for capture objects with no real OS handle. Tests that spawn
# subprocesses (git, scripts) then hit an intermittent WinError 6 on
# DuplicateHandle and flake. Running under xdist workers (-n auto) uses a
# different per-worker capture path and the flake disappears -- the suite is
# fully green and ~2x faster (~20s vs ~42s). Keeping -n auto in addopts makes
# the green path the default path so no one meets the phantom failures.
#
# Debugging a single test? Use: pytest -n0 -s tests/test_x.py::Case::test_y
# (-n0 runs in-process; -s disables capture, which also avoids the flake.)
testpaths = tests
addopts = -n auto
